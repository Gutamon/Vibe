<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>登入 · 記帳本</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0f0f11; --surface: #18181c; --border: #2a2a30; --accent: #c8f04a; --text: #e8e8ec; --muted: #6b6b78; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); padding: 40px; border-radius: 12px; width: 100%; max-width: 360px; }
    h2 { margin: 0 0 24px; font-weight: 500; text-align: center; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: 8px; }
    .field input { width: 100%; box-sizing: border-box; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; outline: none; }
    .field input:focus { border-color: var(--accent); }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--accent); color: #111; font-weight: 500; cursor: pointer; margin-top: 10px; }
    .btn:hover { opacity: .9; }
    .link { display: block; text-align: center; margin-top: 20px; font-size: .85rem; color: var(--muted); text-decoration: none; }
    .link:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="auth-card">
    <h2>登入帳號</h2>
    <div class="field"><label>帳號</label><input type="text" id="username" /></div>
    <div class="field"><label>密碼</label><input type="password" id="password" /></div>
    <button class="btn" onclick="doLogin()">登入</button>
    <a href="/register" class="link">還沒有帳號？前往註冊</a>
  </div>
  <script>
    async function doLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/login', { method: 'POST', body: JSON.stringify({username, password})});
      const data = await res.json();
      if(res.ok) location.href = '/';
      else alert(data.error);
    }
  </script>
</body>
</html>
