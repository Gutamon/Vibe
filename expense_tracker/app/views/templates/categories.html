<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>類別管理 · 記帳本</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* 這裡省略了大部分共用 CSS 來維持輕量，引入基本框架 */
    :root { --bg: #0f0f11; --surface: #18181c; --border: #2a2a30; --accent: #c8f04a; --text: #e8e8ec; --muted: #6b6b78; --danger: #ff5f5f; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; margin:0; }
    header { border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 1.1rem; font-weight: 700; } .logo span { color: var(--accent); }
    nav a { color: var(--muted); text-decoration: none; font-size: .85rem; margin-left: 24px; }
    nav a:hover, nav a.active { color: var(--accent); }
    .shell { max-width: 600px; margin: 40px auto; padding: 0 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; }
    .flex { display: flex; gap: 10px; margin-bottom: 24px; }
    .flex input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; outline: none;}
    .flex button { background: var(--accent); color: #000; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: 500;}
    .cat-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: center;}
    .cat-item input { background: transparent; border: 1px solid transparent; color: var(--text); font-size: 1rem; padding: 4px; outline: none; }
    .cat-item input:focus { border-color: var(--accent); border-radius: 4px; }
    .btn-del { background: transparent; border: 1px solid var(--border); color: var(--danger); padding: 6px 12px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
<header>
  <div class="logo">帳 <span>·</span> 本</div>
  <nav>
    <a href="/">支出列表</a>
    <a href="/charts">圖表分析</a>
    <a href="/categories" class="active">類別管理</a>
    <span style="color:var(--muted); margin-left:24px;">|</span>
    <span style="color:var(--text); margin-left:24px;">{{ username }}</span>
    <a href="/logout">登出</a>
  </nav>
</header>
<main class="shell">
  <div class="card">
    <h2 style="font-size:1.2rem; margin-top:0;">自訂義類別</h2>
    <div class="flex">
      <input type="text" id="new-cat" placeholder="輸入新類別名稱...">
      <button onclick="addCat()">新增</button>
    </div>
    <div id="cat-list">
      {% for c in categories %}
      <div class="cat-item">
        <input type="text" value="{{ c.name }}" onchange="updateCat({{ c.id }}, this.value)" />
        <button class="btn-del" onclick="delCat({{ c.id }})">刪除</button>
      </div>
      {% endfor %}
    </div>
  </div>
</main>
<script>
  async function addCat() {
    const name = document.getElementById('new-cat').value;
    const res = await fetch('/api/categories', {method:'POST', body: JSON.stringify({name})});
    if(res.ok) location.reload();
  }
  async function updateCat(id, name) {
    await fetch(`/api/categories/${id}`, {method:'PUT', body: JSON.stringify({name})});
  }
  async function delCat(id) {
    if(!confirm("確定刪除此類別？")) return;
    const res = await fetch(`/api/categories/${id}`, {method:'DELETE'});
    if(res.ok) location.reload();
  }
</script>
</body>
</html>
